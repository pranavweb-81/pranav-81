<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCare - Contact Us</title>
    <link rel="stylesheet" href="con.css">
     <nav>
        <a href="q.html">Home</a>
    </nav>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        header {
            background: #1e2a38;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin-bottom: 5px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .contact-info, .contact-form {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .contact-info h2,
        .contact-form h2 {
            margin-bottom: 15px;
            color: #1e2a38;
        }

        .contact-info p {
            margin: 10px 0;
            color: #555;
        }

        .contact-info i {
            color: #ff6b00;
            margin-right: 10px;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        form input:focus,
        form textarea:focus {
            border-color: #ff6b00;
        }

        form button {
            background: #ff6b00;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        form button:hover {
            background: #e65c00;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #1e2a38;
            color: #fff;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>AutoCare Service</h1>
    <p>Your Trusted Car Service Partner</p>
</header>

<div class="container">

    <!-- Contact Info -->
    <div class="contact-info">
        <h2>Contact Information</h2>
        <p><strong>📍 Address:</strong> AutoCare Garage, Main Road, Kerala</p>
        <p><strong>📞 Phone:</strong> +91 98765 43210</p>
        <p><strong>📧 Email:</strong> support@autocare.com</p>
        <p><strong>⏰ Working Hours:</strong> Mon - Sat: 9 AM - 7 PM</p>
    </div>

    <!-- Contact Form -->
    <div class="contact-form">
        <h2>Send Us a Message</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="tel" placeholder="Your Phone">
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Book Service</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 AutoCare Service. All Rights Reserved.</p>
</footer>

</body>
</html>
